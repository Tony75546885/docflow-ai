services:
  - type: web
    name: docflow-ai
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: docflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: docflow-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: API_KEY_HASH_ROUNDS
        value: 12
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: ANTHROPIC_MAX_RETRIES
        value: 3
      - key: ANTHROPIC_TIMEOUT_MS
        value: 120000
      - key: WEBHOOK_SIGNING_SECRET
        generateValue: true
      - key: RATE_LIMIT_MAX
        value: 100
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: docflow-documents
      - key: S3_REGION
        value: us-east-1
      - key: S3_FORCE_PATH_STYLE
        value: false

databases:
  - name: docflow-db
    plan: free
    databaseName: docflow
    user: docflow

redis:
  - name: docflow-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
